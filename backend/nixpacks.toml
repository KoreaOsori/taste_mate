# nixpacks.toml for TasteMate Backend (Railway)
[phases.setup]
nixPkgs = ["python311", "playwright-driver"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt && playwright install chromium"]

[phases.build]
cmds = ["# No build step needed for Python"]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port 8000"
